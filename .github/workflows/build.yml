name: Build Kerberus

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: native/go.mod

      - name: Install dependencies
        run: python -m pip install --upgrade pip ".[build]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Test native transport
        working-directory: native
        run: go test ./...

      - name: Build signed-input artifacts
        run: python build_release.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kerberus-Windows-${{ github.sha }}
          path: release/*
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  linux-build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: native/go.mod

      - name: Install Linux runtime and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 python3-tk
          python -m pip install --upgrade pip ".[build]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Test native transport
        working-directory: native
        run: go test ./...

      - name: Build Linux portable release
        run: python build_release.py

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kerberus-Linux-${{ github.sha }}
          path: |
            release/Kerberus-linux-*
            release/install-linux.sh
            release/SHA256SUMS-linux.txt
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Kerberus-linux-*
            release/install-linux.sh
            release/SHA256SUMS-linux.txt
