name: Build Kerberus

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: native/go.mod

      - name: Install dependencies
        run: python -m pip install --upgrade pip ".[build]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Test native transport
        working-directory: native
        run: go test ./...

      - name: Build signed-input artifacts
        run: python build_release.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kerberus-release-windows-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  linux-build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: native/go.mod

      - name: Install Linux runtime and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 python3-tk
          python -m pip install --upgrade pip ".[build]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Test native transport
        working-directory: native
        run: go test ./...

      - name: Build Linux portable release
        run: python build_release.py

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kerberus-release-linux-${{ github.sha }}
          path: |
            release/Kerberus-linux-*
            release/install-linux.sh
            release/SHA256SUMS-linux.txt
          if-no-files-found: error
          retention-days: 14

  source-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install source-build dependencies
        run: python -m pip install --upgrade pip ".[build]"

      - name: Build source, wheel and sdist
        run: python build_source_release.py

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kerberus-release-source-${{ github.sha }}
          path: |
            release/Kerberus-*-src.tar.gz
            release/kerberus_i2p-*.tar.gz
            release/kerberus_i2p-*.whl
            release/SHA256SUMS-source.txt
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-build, linux-build, source-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Kerberus-release-*
          path: release-files
          merge-multiple: true

      - name: List release payload
        run: find release-files -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Publish one GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
